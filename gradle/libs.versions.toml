[versions]
# Toolchain — Kotlin 2.3.20 + KSP 2.3.9 pinned together deliberately:
# KSP 2.3.x targets Kotlin language 2.3; Kotlin 2.4.0 has open KSP codegen issues
# (google/ksp#2964) that would put Room's compiler at risk.
kotlin = "2.3.20"
ksp = "2.3.9"
# AGP 8.12 held deliberately: AGP 9.x is a breaking major with KMP plugin
# interactions; 8.12 + Gradle 9.3.1 is a verified-working pairing.
agp = "8.12.0"
composeMultiplatform = "1.11.1"

# Libraries — everything below is latest stable as of 2026-07 unless a hold
# is commented.
kotlinxCoroutines = "1.11.0"
kotlinxSerializationJson = "1.10.0"
ktor = "3.5.0"
koinBom = "4.1.1"
# Room 2.8.4 held deliberately: Room 3.0.0 shipped 2026-07-01 as a breaking
# rewrite (new androidx.room3 package) — too fresh to bet a deadline on.
room = "2.8.4"
sqlite = "2.6.1"
# lifecycle 2.11 is still beta; 2.10.0 is the current stable.
lifecycle = "2.10.0"
activityCompose = "1.13.0"
turbine = "1.2.1"
# material-icons-core froze at 1.7.3 when icons moved out of the main Compose
# distribution; it remains the canonical multiplatform icon artifact.
materialIconsCore = "1.7.3"

# Android SDK
android-compileSdk = "36"
# minSdk 26: lets the launcher ship as a single adaptive vector icon (no
# legacy PNG fallbacks in the repo) and covers effectively all 2026 devices.
android-minSdk = "26"
android-targetSdk = "36"

[libraries]
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinxCoroutines" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinxSerializationJson" }

ktor-client-core = { module = "io.ktor:ktor-client-core", version.ref = "ktor" }
ktor-client-content-negotiation = { module = "io.ktor:ktor-client-content-negotiation", version.ref = "ktor" }
ktor-client-logging = { module = "io.ktor:ktor-client-logging", version.ref = "ktor" }
ktor-client-okhttp = { module = "io.ktor:ktor-client-okhttp", version.ref = "ktor" }
ktor-client-darwin = { module = "io.ktor:ktor-client-darwin", version.ref = "ktor" }
ktor-client-mock = { module = "io.ktor:ktor-client-mock", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }

koin-bom = { module = "io.insert-koin:koin-bom", version.ref = "koinBom" }
koin-core = { module = "io.insert-koin:koin-core" }
koin-android = { module = "io.insert-koin:koin-android" }
koin-compose = { module = "io.insert-koin:koin-compose" }
koin-compose-viewmodel = { module = "io.insert-koin:koin-compose-viewmodel" }
koin-test = { module = "io.insert-koin:koin-test" }

room-runtime = { module = "androidx.room:room-runtime", version.ref = "room" }
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
sqlite-bundled = { module = "androidx.sqlite:sqlite-bundled", version.ref = "sqlite" }

lifecycle-viewmodel = { module = "org.jetbrains.androidx.lifecycle:lifecycle-viewmodel", version.ref = "lifecycle" }
lifecycle-viewmodel-compose = { module = "org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "lifecycle" }
lifecycle-runtime-compose = { module = "org.jetbrains.androidx.lifecycle:lifecycle-runtime-compose", version.ref = "lifecycle" }

androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }

turbine = { module = "app.cash.turbine:turbine", version.ref = "turbine" }
material-icons-core = { module = "org.jetbrains.compose.material:material-icons-core", version.ref = "materialIconsCore" }

[plugins]
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
composeMultiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlinSerialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
room = { id = "androidx.room", version.ref = "room" }
